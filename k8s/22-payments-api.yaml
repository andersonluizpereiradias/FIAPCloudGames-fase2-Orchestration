apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: fcg
spec:
  replicas: 2
  selector:
    matchLabels: { app: payments-api }
  template:
    metadata:
      labels: { app: payments-api }
    spec:
      containers:
        - name: payments-api
          image: fcg/payments-api:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            # payments-api: sem JWT. Usa RabbitMQ e banco proprio (paymentsdb).
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom: { configMapKeyRef: { name: fcg-config, key: ASPNETCORE_ENVIRONMENT } }
            - name: RabbitMq__Host
              valueFrom: { configMapKeyRef: { name: fcg-config, key: RabbitMq__Host } }
            - name: RabbitMq__Port
              valueFrom: { configMapKeyRef: { name: fcg-config, key: RabbitMq__Port } }
            - name: RabbitMq__Username
              valueFrom: { configMapKeyRef: { name: fcg-config, key: RabbitMq__Username } }
            - name: RabbitMq__VirtualHost
              valueFrom: { configMapKeyRef: { name: fcg-config, key: RabbitMq__VirtualHost } }
            - name: RabbitMq__Password
              valueFrom: { secretKeyRef: { name: fcg-secrets, key: RabbitMq__Password } }
            - name: ConnectionStrings__DefaultConnection
              valueFrom: { secretKeyRef: { name: fcg-secrets, key: Payments__ConnectionString } }
          # Pagamentos expõe /health: sonda HTTP.
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: payments-api
  namespace: fcg
spec:
  type: ClusterIP
  selector: { app: payments-api }
  ports:
    - port: 8080
      targetPort: 8080
